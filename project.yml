name: OpenClawApp
options:
  bundleIdPrefix: com.raltemeyer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.raltemeyer.OpenClawApp
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Connects to your OpenClaw gateway on your local network"
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Attach photos to chat with your OpenClaw agents"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

targets:
  OpenClawApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
        type: group
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: OpenClaw
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
